<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  
  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- 그릇/접시 (아래쪽 반원) -->
  <path d="M128 260 C128 260 128 380 256 380 C384 380 384 260 384 260" fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  
  <!-- 편안한 미소 (그릇 안) -->
  <!-- 왼쪽 눈 -->
  <circle cx="208" cy="290" r="12" fill="white"/>
  <!-- 오른쪽 눈 -->
  <circle cx="304" cy="290" r="12" fill="white"/>
  <!-- 입 (미소) -->
  <path d="M220 325 Q256 352 292 325" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 왼쪽: 숟가락 (기울어진) -->
  <g transform="rotate(-25, 148, 200)">
    <ellipse cx="148" cy="152" rx="18" ry="26" fill="white" opacity="0.9"/>
    <line x1="148" y1="178" x2="148" y2="252" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- 오른쪽: 포크 (기울어진) -->
  <g transform="rotate(25, 364, 200)">
    <line x1="364" y1="130" x2="364" y2="252" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <line x1="350" y1="130" x2="350" y2="178" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="364" y1="130" x2="364" y2="178" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="378" y1="130" x2="378" y2="178" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- 하트 (작은, 오른쪽 상단 - 안심/건강) -->
  <path d="M390 100 C390 88 376 82 368 92 C360 82 346 88 346 100 C346 116 368 130 368 130 C368 130 390 116 390 100Z" fill="white" opacity="0.7"/>
