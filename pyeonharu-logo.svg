<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  
  <!-- 아이콘 배경 -->
  <rect x="2" y="4" width="64" height="64" rx="14" fill="url(#lbg)"/>
  
  <!-- 그릇 -->
  <path d="M16 36 C16 36 16 54 34 54 C52 54 52 36 52 36" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- 눈 -->
  <circle cx="27" cy="40" r="2" fill="white"/>
  <circle cx="41" cy="40" r="2" fill="white"/>
  
  <!-- 미소 -->
  <path d="M29 46 Q34 50 39 46" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 숟가락 (왼쪽) -->
  <g transform="rotate(-20, 14, 28)">
    <ellipse cx="14" cy="20" rx="3" ry="4.5" fill="white" opacity="0.9"/>
    <line x1="14" y1="24.5" x2="14" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- 포크 (오른쪽) -->
  <g transform="rotate(20, 54, 28)">
    <line x1="54" y1="16" x2="54" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="51" y1="16" x2="51" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="54" y1="16" x2="54" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="57" y1="16" x2="57" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- 하트 -->
  <path d="M53 10 C53 8 51 7 50 8.5 C49 7 47 8 47 10 C47 12.5 50 14.5 50 14.5 C50 14.5 53 12.5 53 10Z" fill="white" opacity="0.7"/>
  
  <!-- 텍스트 -->
  <text x="80" y="50" font-family="'Pretendard Variable', 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="36" font-weight="800" fill="#171717" letter-spacing="-0.5">편하루</text>
</svg>
